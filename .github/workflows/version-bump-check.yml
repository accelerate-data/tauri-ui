name: version-bump

on:
  pull_request:
    branches:
      - main

jobs:
  version-bump:
    name: version-bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Fetch main branch
        run: git fetch origin main --depth=1

      - name: Get PR branch version
        id: pr_version
        run: echo "version=$(jq -r .version .claude-plugin/plugin.json)" >> $GITHUB_OUTPUT

      - name: Get main branch version
        id: main_version
        run: |
          VERSION=$(git show origin/main:.claude-plugin/plugin.json 2>/dev/null | jq -r '.version // empty' || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version was bumped
        run: |
          PR="${{ steps.pr_version.outputs.version }}"
          MAIN="${{ steps.main_version.outputs.version }}"
          LOWER=$(printf '%s\n%s\n' "$PR" "$MAIN" | sort -V | head -1)
          if [ "$PR" = "$MAIN" ] || [ "$LOWER" = "$PR" ]; then
            echo "plugin.json version was not bumped (or was downgraded)."
            echo "  main: $MAIN"
            echo "  PR:   $PR"
            echo ""
            echo "Increment the version field (patch/minor/major) in .claude-plugin/plugin.json before merging."
            exit 1
          fi
          echo "Version bumped: $MAIN -> $PR"
