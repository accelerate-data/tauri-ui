name: version-bump

on:
  pull_request:
    branches:
      - main

jobs:
  plugin-manifest-validate:
    name: plugin-manifest-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Validate plugin manifests
        run: python3 scripts/validate_plugin_manifests.py

      - name: Run validator tests
        run: python3 -m unittest discover -s tests

  version-bump:
    name: version-bump
    runs-on: ubuntu-latest
    needs: plugin-manifest-validate
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Fetch main branch
        run: git fetch origin main --depth=1

      - name: Check version was bumped
        run: python3 scripts/check_plugin_version_bump.py --base-ref origin/main
